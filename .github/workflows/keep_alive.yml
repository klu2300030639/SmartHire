name: Keep Streamlit App Awake

on:
  schedule:
    # Run every 6 hours to prevent Streamlit free tier from going to sleep
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          curl -I https://smarthire-ai-engine.streamlit.app/
